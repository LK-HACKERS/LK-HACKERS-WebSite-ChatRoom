<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKHACKERS | OPEN MESH PORTAL</title>
    <style>
        :root { 
            --accent: #ffcc00; 
            --bg: #000; 
            --panel-bg: rgba(0, 0, 0, 0.9); 
            --font-family: 'Courier New', monospace; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            color: #eee; 
            font-family: var(--font-family);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #matrix { 
            position: fixed; 
            top: 0; left: 0; 
            z-index: 1; 
            opacity: 0.3; 
        }

        #ui-wrapper {
            position: relative;
            z-index: 10; 
            height: 100vh;
            display: flex; 
            flex-direction: column;
        }

        nav {
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 2px solid var(--accent);
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .main-container {
            width: 100%;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            flex-grow: 1;
            overflow-y: auto;
        }

        @media (min-width: 900px) {
            .main-container { grid-template-columns: 1fr 350px; padding: 20px; }
        }

        /* CHAT BOX */
        .terminal-wrapper {
            border: 1px solid var(--accent); 
            background: var(--panel-bg);
            display: flex; 
            flex-direction: column;
        }
        
        #chat-output { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            font-size: 0.85rem; 
            background: rgba(0,0,0,0.5);
        }

        .input-area { border-top: 1px solid var(--accent); padding: 10px; display: flex; gap: 5px; }
        input { background: transparent; border: 1px solid #333; color: #fff; outline: none; flex-grow: 1; padding: 10px; font-family: inherit; }
        
        .btn { 
            background: #1a1a00; 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            padding: 8px 15px; 
            cursor: pointer; 
            font-weight: bold;
        }
        .btn:hover { background: var(--accent); color: #000; }

        /* MEMBER PANEL */
        .sidebar-panel { border: 1px solid var(--accent); background: var(--panel-bg); padding: 15px; margin-bottom: 10px; }
        .member-card { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #222; }
        .online-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="ui-wrapper">
    <nav>
        <div style="color: var(--accent); font-weight: bold;">LKHACKERS | OPEN NODE</div>
        <div id="my-id" style="font-size: 0.7rem; color: #888;">YOUR ID: CONNECTING...</div>
    </nav>

    <div class="main-container">
        <div class="terminal-wrapper">
            <div style="background: #1a1a00; padding: 5px 15px; font-size: 0.7rem; color: var(--accent); border-bottom: 1px solid var(--accent);">GLOBAL_MESH_CHAT</div>
            <div id="chat-output"></div>
            <div class="input-area">
                <input type="text" id="username" placeholder="Name" style="width: 80px; flex-grow: 0;">
                <input type="text" id="msgInput" placeholder="Message...">
                <button class="btn" id="sendBtn">SEND</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-panel">
                <h3 style="color: var(--accent); font-size: 0.8rem; margin-bottom: 10px;">VOICE CONNECT</h3>
                <input type="text" id="remoteId" placeholder="Enter Member ID" style="width: 100%; margin-bottom: 10px;">
                <button class="btn" style="width: 100%;" onclick="startCall()">CALL MEMBER</button>
            </div>

            <div class="sidebar-panel">
                <h3 style="color: var(--accent); font-size: 0.8rem; margin-bottom: 10px;">ACTIVE NOW</h3>
                <div id="member-list">
                    <div class="member-card">
                        <span><span class="online-dot"></span> System_Bot</span>
                        <span style="font-size: 0.6rem; color: #666;">ID: 0000</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
    // 1. Matrix Background
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    let width, height, columns, drops;

    function initMatrix() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        columns = Math.floor(width / 20);
        drops = Array(columns).fill(1);
    }

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "#ffcc00"; 
        ctx.font = "15px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = String.fromCharCode(Math.random() * 128);
            ctx.fillText(text, i * 20, drops[i] * 20);
            if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    initMatrix();
    setInterval(drawMatrix, 50);

    // 2. Peer Communication (For Calling & Identity)
    const peer = new Peer(); // PeerJS සර්වර් එකට සම්බන්ධ වෙනවා
    
    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = "YOUR ID: " + id;
        addChatMessage("SYSTEM", "ඔබ ජාලයට සම්බන්ධ වුණා. ඔබේ ID එක: " + id);
    });

    // කෝල් එකක් එන විට
    peer.on('call', (call) => {
        if(confirm("යමෙක් ඔබට කතා කරයි! සම්බන්ධ වෙනවාද?")) {
            navigator.mediaDevices.getUserMedia({video: false, audio: true}).then((stream) => {
                call.answer(stream);
                addChatMessage("SYSTEM", "Call එකට සම්බන්ධ වුණා.");
            });
        }
    });

    function startCall() {
        const id = document.getElementById('remoteId').value;
        if(!id) return alert("කතා කිරීමට මෙම්බර් කෙනෙක්ගේ ID එක ඇතුළත් කරන්න.");
        
        navigator.mediaDevices.getUserMedia({video: false, audio: true}).then((stream) => {
            const call = peer.call(id, stream);
            addChatMessage("SYSTEM", id + " වෙත කෝල් එකක් ගත්තා...");
        });
    }

    // 3. Simple Chat UI Logic
    function addChatMessage(user, msg) {
        const output = document.getElementById('chat-output');
        const div = document.createElement('div');
        div.style.marginBottom = "8px";
        div.innerHTML = `<span style="color:var(--accent)">[${user}]</span>: ${msg}`;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    document.getElementById('sendBtn').onclick = () => {
        const name = document.getElementById('username').value || "Anonymous";
        const msg = document.getElementById('msgInput').value;
        if(msg) {
            addChatMessage(name, msg);
            document.getElementById('msgInput').value = "";
            // සැබෑ Chat එකක් සඳහා මෙතනදී Database එකකට (Firebase වගේ) Data යැවිය යුතුයි.
        }
    };

    window.addEventListener('resize', initMatrix);
</script>
</body>
</html>
