<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LKHACKERS | REAL-TIME MESH</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #eee; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        #matrix { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.3; }
        #ui { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; background: rgba(0,0,0,0.7); }
        nav { padding: 10px 20px; border-bottom: 2px solid var(--accent); background: #000; display: flex; justify-content: space-between; align-items: center; }
        .main { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 15px; flex-grow: 1; overflow-y: auto; }
        @media (min-width: 900px) { .main { grid-template-columns: 1fr 350px; } }
        .chat-box { border: 1px solid var(--accent); background: rgba(10,10,10,0.9); display: flex; flex-direction: column; height: 450px; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 0.9rem; }
        .input-grp { display: flex; border-top: 1px solid var(--accent); }
        input { background: transparent; border: none; color: #fff; padding: 12px; outline: none; font-family: inherit; }
        #msgInput { flex-grow: 1; }
        #nameInput { width: 80px; border-right: 1px solid var(--accent); }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; }
        .sidebar-item { border: 1px solid var(--accent); background: rgba(10,10,10,0.9); padding: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="ui">
    <nav>
        <div style="font-weight:bold; color:var(--accent)">LKHACKERS | LIVE PORTAL</div>
        <div id="myIdDisplay" style="font-size:0.7rem; color:var(--accent)">ID: CONNECTING...</div>
    </nav>

    <div class="main">
        <div class="chat-box">
            <div id="messages">
                <div style="color: #666;">[SYSTEM]: දකුණු පස ඇති ඔබේ ID එක අන් අය සමග බෙදාගන්න. එවිට ඔවුන්ට ඔබව සම්බන්ධ කරගත හැක.</div>
            </div>
            <div class="input-area">
                <div class="input-grp">
                    <input type="text" id="nameInput" placeholder="Name">
                    <input type="text" id="msgInput" placeholder="Message...">
                    <button class="btn" onclick="sendToAll()">SEND</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-item">
                <h3 style="color:var(--accent); font-size:0.8rem;">START VOICE CALL</h3>
                <input type="text" id="remoteId" placeholder="Enter Friend's ID" style="width:100%; margin:10px 0; padding:8px; background:#111; border:1px solid #333; color:#fff;">
                <button class="btn" style="width:100%" onclick="makeCall()">CALL MEMBER</button>
            </div>
            <div id="callStatus" style="font-size:0.7rem; color:#0f0; text-align:center;"></div>
        </div>
    </div>
</div>

<script>
    // 1. Matrix
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    let width, height, columns, drops;
    function initM() { width=canvas.width=window.innerWidth; height=canvas.height=window.innerHeight; columns=Math.floor(width/20); drops=Array(columns).fill(1); }
    function drawM() { ctx.fillStyle="rgba(0,0,0,0.05)"; ctx.fillRect(0,0,width,height); ctx.fillStyle="#ffcc00"; ctx.font="15px monospace"; for(let i=0;i<drops.length;i++){ const txt=String.fromCharCode(Math.random()*128); ctx.fillText(txt, i*20, drops[i]*20); if(drops[i]*20>height&&Math.random()>0.975) drops[i]=0; drops[i]++; } }
    initM(); setInterval(drawM, 50);

    // 2. Real Communication (PeerJS)
    const peer = new Peer();
    let conn;

    peer.on('open', (id) => {
        document.getElementById('myIdDisplay').innerText = "YOUR ID: " + id;
    });

    // මැසේජ් එකක් එන විට
    peer.on('connection', (c) => {
        conn = c;
        conn.on('data', (data) => {
            showMsg(data.name, data.msg);
        });
    });

    // කෝල් එකක් එන විට
    peer.on('call', (call) => {
        if (confirm("Incoming Voice Call! Answer?")) {
            navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
                call.answer(stream);
                const audio = document.createElement('audio');
                call.on('stream', remoteStream => {
                    audio.srcObject = remoteStream;
                    audio.play();
                    document.getElementById('callStatus').innerText = "ON CALL...";
                });
            });
        }
    });

    function sendToAll() {
        const name = document.getElementById('nameInput').value || "GreyHat";
        const msg = document.getElementById('msgInput').value;
        const rId = document.getElementById('remoteId').value;

        if(!msg) return;
        showMsg("You", msg);

        if(rId) {
            const outConn = peer.connect(rId);
            outConn.on('open', () => {
                outConn.send({name: name, msg: msg});
            });
        } else {
            alert("මැසේජ් එක යවන්න නම් Friend's ID එක ඇතුළත් කරන්න.");
        }
        document.getElementById('msgInput').value = "";
    }

    function showMsg(user, text) {
        const msgDiv = document.createElement('div');
        msgDiv.innerHTML = `<span style="color:var(--accent)">[${user}]</span>: ${text}`;
        document.getElementById('messages').appendChild(msgDiv);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function makeCall() {
        const rId = document.getElementById('remoteId').value;
        if(!rId) return alert("ID එක ඇතුළත් කරන්න.");
        
        navigator.mediaDevices.getUserMedia({audio: true}).then(stream => {
            const call = peer.call(rId, stream);
            document.getElementById('callStatus').innerText = "RINGING...";
            const audio = document.createElement('audio');
            call.on('stream', remoteStream => {
                audio.srcObject = remoteStream;
                audio.play();
                document.getElementById('callStatus').innerText = "CONNECTED";
            });
        }).catch(err => {
            alert("මයික්‍රොෆෝනයට අවසර දෙන්න.");
        });
    }
</script>
</body>
</html>
